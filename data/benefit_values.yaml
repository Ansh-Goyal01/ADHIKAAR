# R6 — benefit value estimates, one entry per scheme.
#
# Same discipline as rule sign-off: an entry reaches the frontend ONLY when
# review_status is `verified` (certified against the official text quoted in
# `basis`). Everything ships `pending` first; scripts/generate_scheme_data.py
# silently drops non-verified entries from schemes.json.
#
# Fields:
#   label         — display string, English canonical (edge-translated downstream)
#   amount_inr    — headline amount in rupees (annualized where period is year)
#   period        — year | month | one_time | cover | varies
#   basis         — where the number comes from (checked against the corpus
#                   benefits section during review)
#   review_status — pending | verified
#
# Drafted 2026-07-18 from the corpus benefits sections.
# Verified 2026-07-18 (Ansh sign-off): every entry re-checked against the
# corpus benefits text. Corrections made during review: pm-svanidhi first
# tranche ₹10,000 → ₹15,000 (corpus states up to ₹15,000/₹25,000/₹50,000);
# five ids remapped to catalog scheme_ids (nsap-ignoaps, ab-pmjay, pmv,
# pmay-g, pms-sc) — the drafts used ids that don't exist in schemes.json.

schemes:
  pm-kisan:
    label: "₹6,000 per year"
    amount_inr: 6000
    period: year
    basis: "Income support of ₹6,000/year in three equal instalments of ₹2,000."
    review_status: verified
  nsap-ignoaps:
    label: "₹200 per month (₹500 from age 80)"
    amount_inr: 2400
    period: month
    basis: "Central pension of ₹200/month for 60–79; ₹500/month at 80+. States top this up."
    review_status: verified
  ignwps:
    label: "₹300 per month"
    amount_inr: 3600
    period: month
    basis: "Central widow pension of ₹300/month for ages 40–79 (₹500/month at 80+)."
    review_status: verified
  igndps:
    label: "₹300 per month"
    amount_inr: 3600
    period: month
    basis: "Central disability pension of ₹300/month for ages 18–79 (₹500/month at 80+)."
    review_status: verified
  pmsby:
    label: "₹2 lakh accident cover for ₹20 a year"
    amount_inr: 200000
    period: cover
    basis: "Accidental death/full disability cover of ₹2 lakh at an annual premium of ₹20 (₹1 lakh for partial disability)."
    review_status: verified
  pmjjby:
    label: "₹2 lakh life cover for ₹436 a year"
    amount_inr: 200000
    period: cover
    basis: "Life cover of ₹2 lakh at an annual premium of ₹436."
    review_status: verified
  apy:
    label: "₹1,000–₹5,000 monthly pension from age 60"
    amount_inr: 0
    period: varies
    basis: "Guaranteed pension of ₹1,000–₹5,000/month from 60 depending on the contribution slab chosen."
    review_status: verified
  ab-pmjay:
    label: "₹5 lakh per family per year of health cover"
    amount_inr: 500000
    period: cover
    basis: "Cashless hospitalization cover of ₹5 lakh per eligible family per year."
    review_status: verified
  pmuy:
    label: "Free LPG connection (₹1,600 support)"
    amount_inr: 1600
    period: one_time
    basis: "Cash assistance of ₹1,600 for a 14.2 kg-cylinder connection (₹1,150 for 5 kg); first refill and stove free."
    review_status: verified
  pm-svanidhi:
    label: "Working-capital loan up to ₹15,000 (first tranche)"
    amount_inr: 15000
    period: one_time
    basis: "First-tranche collateral-free loan up to ₹15,000, then ₹25,000 and ₹50,000 on timely repayment; 7% interest subsidy."
    review_status: verified
  pmv:
    label: "₹15,000 toolkit + ₹500/day training stipend"
    amount_inr: 15000
    period: one_time
    basis: "Toolkit incentive of ₹15,000 and a stipend of ₹500/day during training; collateral-free loans from ₹1 lakh."
    review_status: verified
  pmay-g:
    label: "₹1.20 lakh housing assistance (plain areas)"
    amount_inr: 120000
    period: one_time
    basis: "Unit assistance of ₹1.20 lakh in plain areas (₹1.30 lakh in hilly/difficult areas and IAP districts)."
    review_status: verified
  pmfby:
    label: "Crop insurance at 2% premium or less"
    amount_inr: 0
    period: varies
    basis: "Farmer premium capped at 2% (kharif), 1.5% (rabi), 5% (commercial/horticultural); sum insured varies by crop and area."
    review_status: verified
  sukanya-samriddhi:
    label: "High-interest savings for a daughter"
    amount_inr: 0
    period: varies
    basis: "Small-savings account, minimum deposit ₹250/year; interest rate notified quarterly; value depends on deposits."
    review_status: verified
  pms-sc:
    label: "Tuition + academic allowance (course-dependent)"
    amount_inr: 0
    period: varies
    basis: "Compulsory fees plus academic allowance ₹4,000–₹13,500/year by course group (hosteller rates), lower for day scholars."
    review_status: verified
