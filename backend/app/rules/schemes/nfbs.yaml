scheme_id: nfbs
version: '2026-07-13'
rules:
- id: primary-breadwinner-deceased
  kind: require
  when:
    field: bereavement_event
    op: eq
    value: true
  clause: The benefit is provided on the death of the primary breadwinner of a family living
    below the poverty line — the primary breadwinner of the applicant's family must have
    been deceased.
  source_url: https://www.myscheme.gov.in/schemes/nfbs
  ask: Has the main earner (primary breadwinner) of your family passed away?
  review_status: verified
- id: bpl-household
  kind: require
  self_declared: true
  verify_hint: Confirm your household is on the current BPL list at your Gram Panchayat office
    (rural) or municipal ward office (urban) — carry your BPL/ration card.
  when:
    field: has_bpl_card
    op: eq
    value: true
  clause: The family of the applicant must be living Below Poverty Line (BPL).
  source_url: https://www.myscheme.gov.in/schemes/nfbs
  ask: Is your household on the Below Poverty Line (BPL) list?
  review_status: verified
simplifications:
- 'Not modeled: The deceased breadwinner must have been more than 18 and less than 60 years
    old at the time of death — this age-at-death is not checked here, confirm it at the office.'
- 'Not modeled: The applicant must be the succeeding head of household / primary breadwinner
    to whom the one-time benefit is paid (a recipient detail, decided at the office).'
- 'Not modeled: Indian citizenship is assumed (this tool serves Indian residents).'
