scheme_id: pm-kisan
version: "2026-07-11"
rules:
  - id: landholding-farmer-family
    kind: require
    when: { field: is_farmer_with_land, op: eq, value: true }
    clause: >-
      All landholding farmers' families, which have cultivable land holding in their
      names are eligible to get benefit under the scheme.
    source_url: https://www.myscheme.gov.in/schemes/pm-kisan
    ask: "Does your family own cultivable land in its own name?"
  - id: exclude-income-tax-payer
    kind: exclude
    when: { field: pays_income_tax, op: eq, value: true }
    clause: >-
      The following categories of beneficiaries of higher economic status shall not be
      eligible: ... All Persons who paid Income Tax in last assessment year.
    source_url: https://www.myscheme.gov.in/schemes/pm-kisan
    ask: "Did anyone in your family pay income tax in the last assessment year?"
  - id: exclude-government-employee-family
    kind: exclude
    when: { field: family_member_in_govt_service, op: eq, value: true }
    clause: >-
      Farmer families in which one or more of its members are serving or retired officers
      and employees of Central/State Government Ministries/Offices/Departments shall not
      be eligible.
    source_url: https://www.myscheme.gov.in/schemes/pm-kisan
    ask: "Is anyone in your family a serving government employee?"
  - id: exclude-pensioner-over-10k
    kind: exclude
    when: { field: receives_govt_pension_over_10k, op: eq, value: true }
    clause: >-
      All superannuated/retired pensioners whose monthly pension is Rs.10,000/- or more
      shall not be eligible.
    source_url: https://www.myscheme.gov.in/schemes/pm-kisan
    ask: "Does anyone in your family receive a government pension of ₹10,000 or more per month?"
simplifications:
  - >-
    Official exclusions not yet encoded: institutional landholders; former/present
    holders of constitutional posts, Ministers, MPs/MLAs/MLCs, mayors of municipal
    corporations, district panchayat chairpersons; and practicing registered
    professionals (doctors, engineers, lawyers, chartered accountants, architects).
  - >-
    The government-employee exclusion is encoded broader than the official text,
    which exempts Multi-Tasking Staff / Class IV / Group D employees.
