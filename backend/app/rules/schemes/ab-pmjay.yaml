scheme_id: ab-pmjay
version: "2026-07-11"
rules:
  - id: secc-priority-category
    kind: require
    self_declared: true
    when:
      any:
        - { field: is_pmjay_priority_category, op: eq, value: true }
        - { field: has_bpl_card, op: eq, value: true }
    clause: >-
      Eligibility is based on the SECC 2011 deprivation and occupational criteria — e.g.
      landless households deriving a major part of their income from manual casual labour,
      and listed urban occupational categories (ragpicker, domestic worker, street vendor,
      construction worker, sanitation worker and similar).
    source_url: https://www.myscheme.gov.in/schemes/ab-pmjay
    ask: "Does your household match an SECC deprivation category (e.g. landless manual labour) or a listed occupational category, or hold a BPL/priority ration card?"
  - id: exclude-monthly-income-over-10k
    kind: exclude
    when: { field: annual_family_income_inr, op: gt, value: 120000 }
    clause: "Households earning a monthly income above ₹10,000/- are excluded."
    source_url: https://www.myscheme.gov.in/schemes/ab-pmjay
    ask: "Is your family's income above ₹10,000 per month?"
  - id: exclude-government-employee
    kind: exclude
    when: { field: family_member_in_govt_service, op: eq, value: true }
    clause: "Households with any member employed in government are excluded."
    source_url: https://www.myscheme.gov.in/schemes/ab-pmjay
    ask: "Is anyone in your household a government employee?"
  - id: exclude-motorized-vehicle
    kind: exclude
    when: { field: owns_motorized_vehicle, op: eq, value: true }
    clause: >-
      Households owning a motorised two/three/four wheeler or fishing boat are excluded
      (SECC automatic exclusion).
    source_url: https://www.myscheme.gov.in/schemes/ab-pmjay
    ask: "Does your household own a motorised vehicle or fishing boat?"
