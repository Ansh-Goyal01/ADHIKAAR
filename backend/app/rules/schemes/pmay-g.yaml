scheme_id: pmay-g
version: "2026-07-11"
rules:
  - id: rural-household
    kind: require
    when: { field: area, op: eq, value: rural }
    clause: >-
      The universe of eligible beneficiaries under PMAY-G includes all the houseless
      households and households living in kutcha houses in rural areas.
    source_url: https://www.myscheme.gov.in/schemes/pmay-g
    ask: "Do you live in a rural area (village)?"
  - id: kutcha-house
    kind: require
    when: { field: house_type, op: eq, value: kutcha }
    clause: >-
      All households living in houses with pucca roofs and/or pucca walls and households
      living in houses with more than 2 rooms are filtered out.
    source_url: https://www.myscheme.gov.in/schemes/pmay-g
    ask: "Is your current house kutcha (mud/thatch/temporary, up to 2 rooms)?"
  - id: exclude-motorized-vehicle
    kind: exclude
    when: { field: owns_motorized_vehicle, op: eq, value: true }
    clause: >-
      Automatic exclusion: households owning a motorised two/three/four wheeler or
      fishing boat.
    source_url: https://www.myscheme.gov.in/schemes/pmay-g
    ask: "Does your household own a motorised two/three/four-wheeler or fishing boat?"
  - id: exclude-income-tax-payer
    kind: exclude
    when: { field: pays_income_tax, op: eq, value: true }
    clause: "Automatic exclusion: any household member paying income tax."
    source_url: https://www.myscheme.gov.in/schemes/pmay-g
    ask: "Does anyone in your household pay income tax?"
  - id: exclude-government-employee
    kind: exclude
    when: { field: family_member_in_govt_service, op: eq, value: true }
    clause: "Automatic exclusion: households with any member as a government employee."
    source_url: https://www.myscheme.gov.in/schemes/pmay-g
    ask: "Is any member of your household a government employee?"
