scheme_id: pm-svanidhi
version: '2026-07-11'
rules:
- id: street-vendor
  kind: require
  when:
    field: is_street_vendor
    op: eq
    value: true
  clause: The scheme is available to street vendors engaged in vending in urban areas.
  source_url: https://www.myscheme.gov.in/schemes/pm-svanidhi
  ask: Do you work as a street vendor (selling goods or services from a cart, stall, or public
    space)?
  review_status: verified
- id: vending-certificate-survey-or-lor
  kind: require
  when:
    field: has_vending_certificate_or_lor
    op: eq
    value: true
  clause: 'Eligible: street vendors in possession of a Certificate of Vending / Identity Card
    issued by Urban Local Bodies; vendors identified in the survey but not yet issued a Certificate;
    and vendors left out of the survey who have been issued a Letter of Recommendation (LoR).'
  source_url: https://www.myscheme.gov.in/schemes/pm-svanidhi
  ask: Do you have a Certificate of Vending, a ULB vendor ID card, a survey listing, or a
    Letter of Recommendation?
  review_status: verified
simplifications:
- 'Vending must occur within ULB geographical limits, but residence area is
  deliberately NOT required: the official text makes peri-urban/RURAL-resident
  vendors eligible with a ULB/TVC-issued LoR, so the urban nexus is carried by
  the ULB-issued certificate/survey/LoR requirement instead. A require area=urban
  rule would wrongly deny them (2026-07-14 semantic audit flag refuted against
  the official text, certified).'
- 'Survey-identified vendors without a Certificate of Vending are eligible per
  the official text; the wizard ask includes "a survey listing" so they can
  answer yes, but the field name (has_vending_certificate_or_lor) undersells
  this — vocabulary description updated to match (2026-07-14, certified).'
