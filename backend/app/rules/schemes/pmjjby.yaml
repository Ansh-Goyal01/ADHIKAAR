scheme_id: pmjjby
version: "2026-07-11"
rules:
  - id: age-at-least-18
    kind: require
    when: { field: age, op: gte, value: 18 }
    clause: "The age of the applicant must be between 18 to 50 years."
    source_url: https://www.myscheme.gov.in/schemes/pmjjby
    ask: "What is your age?"
  - id: age-at-most-50
    kind: require
    when: { field: age, op: lte, value: 50 }
    clause: "The age of the applicant must be between 18 to 50 years."
    source_url: https://www.myscheme.gov.in/schemes/pmjjby
    ask: "What is your age?"
  - id: bank-or-post-office-account
    kind: require
    when: { field: has_bank_account, op: eq, value: true }
    clause: "The applicant must hold an individual bank / post office account."
    source_url: https://www.myscheme.gov.in/schemes/pmjjby
    ask: "Do you have an individual bank or post office account?"
