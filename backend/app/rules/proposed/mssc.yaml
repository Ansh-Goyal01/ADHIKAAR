simplifications:
- The scheme is available through Post Offices and eligible Public and Private Sector Banks.
- The scheme offers a 2-year tenure with an interest rate of 7.5% per annum (compounded quarterly)
  on deposits ranging from ₹1,000 to ₹2,00,000.
