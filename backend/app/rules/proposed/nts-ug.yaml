simplifications:
- The scholarship is initially awarded for one year from the date of admission and is renewable
  for the remaining duration of the degree programme, subject to satisfactory academic performance
  and conduct as prescribed by the concerned university.
- The student must clear all papers in every semester and appear in regular examinations.
- 'Not modeled: The applicant should have secured admission through the All India Entrance
  Examination (AIEE) conducted for ICAR admissions.'
- 'Not modeled: The student must not leave the course within one month of admission.'
- 'Not modeled: The student must not change the discipline/subject initially allotted for
  which the scholarship was awarded.'
- 'Not modeled: The student must not change the University during the tenure of the scholarship.'
- Cannot verify the university is outside the applicant's home state — only current state
  of residence is tracked, not a separate domicile state.
- The no-other-scholarship exclusivity condition is not modeled (no field tracks other scholarships
  held).
- The minimum CGPA/OGPA renewal requirement (for continuing students) is not modeled.
