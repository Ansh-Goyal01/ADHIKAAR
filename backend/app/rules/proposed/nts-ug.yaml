    field: occupation
    op: eq
    value: Agriculture or allied disciplines
    any: null
    all: null
  clause: The applicant should be pursuing a Bachelor's degree programme in Agriculture or
    allied disciplines.
  source_url: https://www.myscheme.gov.in/schemes/nts-ug
  ask: What is your current field of study?
  self_declared: false
