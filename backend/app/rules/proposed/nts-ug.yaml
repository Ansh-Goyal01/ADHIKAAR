  hold_reason: The defining criterion (pursuing a Bachelor's in Agriculture) was mapped onto
    a free-text occupation exact-string match that can effectively never fire, and the AIEE-admission
    criterion onto is_post_matric_student; multiple duplicate is_student rules remained. Needs
    a course-of-study field and restructuring.
  source_url: https://www.myscheme.gov.in/schemes/nts-ug
