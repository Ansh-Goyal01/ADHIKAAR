blocked_rules:
- criterion: The applicant should have secured admission through the All India Entrance Examination
    (AIEE) conducted for ICAR admissions.
  proposed_field:
    name: aiee_admission
    type: boolean
    meaning: Whether the applicant secured admission through AIEE
  suggested_rule_id: aiee-admission
- criterion: The student must not leave the course within one month of admission.
  proposed_field:
    name: course_dropout
    type: boolean
    meaning: Whether the student dropped out of the course within one month
  suggested_rule_id: no-early-dropout
- criterion: The student must not change the discipline/subject initially allotted for which
    the scholarship was awarded.
  proposed_field:
    name: discipline_change
    type: boolean
    meaning: Whether the student changed their discipline/subject
  suggested_rule_id: no-discipline-change
- criterion: The student must not change the University during the tenure of the scholarship.
  proposed_field:
    name: university_change
    type: boolean
    meaning: Whether the student changed their university
  suggested_rule_id: no-university-change
rejected_drafts: []
simplifications:
- The scholarship is initially awarded for one year from the date of admission and is renewable
  for the remaining duration of the degree programme, subject to satisfactory academic performance
  and conduct as prescribed by the concerned university.
- The student must clear all papers in every semester and appear in regular examinations.
