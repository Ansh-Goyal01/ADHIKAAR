scheme_id: vdcspds
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: held-back-needs-rework
  source_url: https://www.myscheme.gov.in/schemes/vdcspds
  hold_reason: The scheme's defining criterion (a National Trust Act 1999 disability category
    — Autism/CP/Intellectual Disability/Multiple Disabilities) is entirely unencoded and doesn't
    map cleanly onto the existing disability_percent field (a different legal test). Needs
    a dedicated field.
rules:
- id: age-at-least-10
  kind: require
  when:
    field: age
    op: gte
    value: 10
  clause: Beneficiary should be of the age of 10 years or more
  source_url: https://www.myscheme.gov.in/schemes/vdcspds
  ask: What is the beneficiary's age?
  self_declared: false
  verify_hint: ''
  review_status: proposed
blocked_rules:
- criterion: Beneficiary should have one of the disabilities under the National Trust Act,
    1999, which are Autism, Cerebral Palsy, Mental Retardation and Multiple Disabilitities.
  proposed_field:
    name: disability_type
    type: string
    meaning: The specific type of disability as per the National Trust Act, 1999 (Autism,
      Cerebral Palsy, Mental Retardation, Multiple Disabilities).
  suggested_rule_id: has-national-trust-disability
- criterion: Beneficiary should not be simultaneously enrolled under Samarth or Gharaunda
    scheme.
  proposed_field:
    name: is_enrolled_in_samarth_or_gharaunda
    type: boolean
    meaning: Is the beneficiary simultaneously enrolled under Samarth or Gharaunda scheme?
  suggested_rule_id: not-enrolled-in-samarth-or-gharaunda
