blocked_rules:
- criterion: The student should have secured admission in the approved course at Masters,
    M.Phil or PhD levels abroad for the [listed courses](https://socialjustice.gov.in/writereaddata/UploadFile/Guidelines%20ISEL%20Scheme%20(wef%2001%20Oct%202017).pdf).
  proposed_field:
    name: approved_course_abroad
    type: boolean
    meaning: Whether the student has secured admission in an approved course abroad.
  suggested_rule_id: approved-course-abroad
- criterion: The applicant should have availed loan from a scheduled bank under the Education
    Loan Scheme of the Indian Banks Association (IBA) for the purpose.
  proposed_field:
    name: has_education_loan_from_ibc
    type: boolean
    meaning: Whether the applicant has an education loan from a scheduled bank under the IBA.
  suggested_rule_id: has-education-loan-from-ibc
rejected_drafts: []
simplifications:
- The scheme will be implemented by the Nodal Bank as per the MoU between the Banks and the
  Ministry of Social Justice & Empowerment.
- The funds will be released to the applicants on a first-come-first-served basis, subject
  to a maximum amount to be worked out every year based on the total budget made available
  that year, under the scheme.
