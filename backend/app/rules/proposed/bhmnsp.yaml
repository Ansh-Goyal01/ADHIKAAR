blocked_rules:
- criterion: The scholarship will be awarded to minority girl students who are studying in
    Class 9th to 12th
  proposed_field:
    name: current_class_grade
    type: string
    meaning: The student's current class or grade level (e.g., 9th, 10th, 11th, 12th).
  suggested_rule_id: studying-class-9th-to-12th
- criterion: have secured at least 50% marks or equivalent grades in aggregate in the previous
    class/qualifying exam.
  proposed_field:
    name: previous_class_percentage
    type: integer
    meaning: Percentage of marks or equivalent grades secured in the previous class/qualifying
      exam.
  suggested_rule_id: previous-class-marks-gte-50
- criterion: The student obtaining benefits under this scheme shall not be allowed to avail
    of benefits under any other scheme for this purpose.
  proposed_field:
    name: receives_other_similar_scholarship
    type: boolean
    meaning: Is the student currently receiving benefits from any other scholarship scheme
      for the same purpose?
  suggested_rule_id: exclude-other-similar-scholarship
- criterion: A student shall be eligible for only one scholarship out of all the available
    Scholarships of the Central Government meant for SC/ST/OBC/minority.
  proposed_field:
    name: receives_other_central_govt_scholarship_sc_st_obc_minority
    type: boolean
    meaning: Is the student currently receiving any other Central Government scholarship meant
      for SC/ST/OBC/minority?
  suggested_rule_id: exclude-other-central-govt-scholarship
- criterion: The scholarship will not be given to more than two students from a family of
    the same class
  proposed_field:
    name: family_members_applying_same_class
    type: integer
    meaning: Number of other family members applying for this scholarship for the same class.
  suggested_rule_id: exclude-more-than-two-from-family-same-class
- criterion: No scholarship shall be given for studies abroad for any course.
  proposed_field:
    name: is_studying_abroad
    type: boolean
    meaning: Is the student currently pursuing studies abroad?
  suggested_rule_id: exclude-studies-abroad
rejected_drafts: []
simplifications:
- An Income certificate, issued by a Competent Authority in the State/UTs Governments is required
  in respect of parent/guardian of the student.
- A self-Certified Community Certificate is required from a student who has attained 18 years
  of age. For others, the Community Certificate certified by the parent/guardian of the student
  is required.
- If a student violates school discipline or any other terms and conditions of the scholarship,
  the scholarship may be suspended or cancelled. The State Government/Union Territory Administration
  can also directly cancel the award if duly satisfied with the reasons of violation of these
  regulations governing the scheme.
- If a student is found to have obtained a scholarship by false statement, her scholarship
  will be cancelled forthwith and the amount of the scholarship paid will be recovered by
  the concerned State/UT Govt.
