rules:
- id: occupation-is-beedi-cine-or-mine-worker
  kind: require
  when:
    field: occupation
    op: eq
    value: beedi worker, cine worker, or an iron, manganese, chrome, limestone, dolomite,
      or mica mine worker
    any: null
    all: null
  clause: The applicant must be a registered beedi worker, cine worker, or an iron, manganese,
    chrome, limestone, dolomite, or mica mine worker.
  source_url: https://www.myscheme.gov.in/schemes/lws-h
  ask: What is your occupation?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: female-worker-first-or-second-delivery
  kind: require
  when:
    field: gender
    op: eq
    value: female
    any: null
    all: null
  clause: The applicant must be a female worker undergoing her first or second delivery to
    avail the maternity benefit.
  source_url: https://www.myscheme.gov.in/schemes/lws-h
  ask: Are you a female worker undergoing your first or second delivery?
  self_declared: false
  verify_hint: ''
  review_status: proposed
