scheme_id: pm-vikas
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: held-back-needs-rework
  source_url: https://www.myscheme.gov.in/schemes/pm-vikas
  hold_reason: Extractor applied the Women Leadership component's age(18+)/gender(female)
    requirements to the whole scheme, which would wrongly exclude all men and 14-17 year-olds
    from the general skilling track. Needs the components split.
rules:
- id: age-between-14-and-45-for-skilling-and-education
  kind: require
  when:
    field: age
    op: gte
    value: 14
    any: null
    all: null
  clause: The Age of the applicant should be 14 to 45 years for skilling and education component
    and 18 to 45 years for Women Leadership and Entrepreneurship Component
  source_url: https://www.myscheme.gov.in/schemes/pm-vikas
  ask: What is your age?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: age-between-18-and-45-for-women-leadership
  kind: require
  when:
    field: age
    op: gte
    value: 18
    any: null
    all: null
  clause: The Age of the applicant should be 14 to 45 years for skilling and education component
    and 18 to 45 years for Women Leadership and Entrepreneurship Component
  source_url: https://www.myscheme.gov.in/schemes/pm-vikas
  ask: What is your age?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: female-for-women-leadership
  kind: require
  when:
    field: gender
    op: eq
    value: female
    any: null
    all: null
  clause: 100% of total seats in Women Leadership and Entrepreneurship component are earmarked
    for women
  source_url: https://www.myscheme.gov.in/schemes/pm-vikas
  ask: What is your gender?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: minority-community-member
  kind: require
  when:
    field: social_category
    op: eq
    value: minority
    any: null
    all: null
  clause: 'The Pradhan Mantri Virasat Ka Samvardhan (PM VIKAS) is a Central Sector Scheme
    of the Ministry of Minority Affairs which converges five erstwhile schemes viz. ‘Seekho
    Aur Kamao’, ‘Nai Manzil’, ‘Nai Roshni’ and ‘USTTAD’ & ‘Hamari Dharohar’ schemes and focuses
    on socio-economic empowerment of six notified minority communities (Muslims, Christians,
    Sikhs, Buddhists, Jains, and Parsis) through the following:'
  source_url: https://www.myscheme.gov.in/schemes/pm-vikas
  ask: Do you belong to a minority community?
  self_declared: false
  verify_hint: ''
  review_status: proposed
blocked_rules:
- criterion: education qualification for Skilling and Training component would be as per NSQF
    norms
  proposed_field:
    name: nsqf_qualified
    type: boolean
    meaning: Whether the applicant has an NSQF qualification
  suggested_rule_id: nsqf-qualified
- criterion: education qualification for Education component would be as per NIOS norms
  proposed_field:
    name: nios_qualified
    type: boolean
    meaning: Whether the applicant has an NIOS qualification
  suggested_rule_id: nios-qualified
- criterion: Candidates with aptitude and leadership qualities will be selected for Women
    Leadership and Entrepreneurship component
  proposed_field:
    name: leadership_aptitude
    type: boolean
    meaning: Whether the applicant has leadership aptitude
  suggested_rule_id: leadership-aptitude
- criterion: 3% reservation across all components for Persons with Disabilities (PwDs)
  proposed_field:
    name: pwd_reservation
    type: boolean
    meaning: Whether the applicant is eligible for PwD reservation
  suggested_rule_id: pwd-reservation
- criterion: Up to 25% non-minority (EWS) candidates may be included in Traditional Skilling
    and 15% in other components to promote inter-community solidarity
  proposed_field:
    name: ews_inclusion
    type: boolean
    meaning: Whether the applicant is eligible for EWS inclusion
  suggested_rule_id: ews-inclusion
rejected_drafts: []
simplifications:
- State-specific notification and enrollment windows
- Document formalities for application
