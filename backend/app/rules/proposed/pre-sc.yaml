scheme_id: pre-sc
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: awaiting-human-review
  source_url: https://www.myscheme.gov.in/schemes/pre-sc
rules:
- id: pursue-studies
  kind: require
  when:
    field: is_student
    op: eq
    value: true
  clause: The applicant should pursue studies in India.
  source_url: https://www.myscheme.gov.in/schemes/pre-sc
  ask: Are you currently pursuing studies?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: social-category-sc
  kind: require
  when:
    field: social_category
    op: eq
    value: sc
  clause: 'The scheme "Pre-Matric Scholarships to the Students Belonging to Scheduled Castes
    & Others with Component 1: Pre-Matric Scholarship for Scheduled Caste Students" has been
    launched by the Department of Social Justice & Empowerment, Ministry of Social Justice
    & Empowerment, Government of India, and aims to support parents of Scheduled Caste children
    through financial assistance for education at the pre-matric stage, improve participation
    in education, minimise dropouts, particularly during transition stages, and enhance opportunities
    for progression to post-matric education.'
  source_url: https://www.myscheme.gov.in/schemes/pre-sc
  ask: Do you belong to the Scheduled Caste category?
  self_declared: true
  verify_hint: ''
  review_status: proposed
- id: exclude-post-matric-student
  kind: exclude
  when:
    field: is_post_matric_student
    op: eq
    value: true
  clause: 'The scheme "Pre-Matric Scholarships to the Students Belonging to Scheduled Castes
    & Others with Component 1: Pre-Matric Scholarship for Scheduled Caste Students" has been
    launched by the Department of Social Justice & Empowerment, Ministry of Social Justice
    & Empowerment, Government of India, and aims to support parents of Scheduled Caste children
    through financial assistance for education at the pre-matric stage, improve participation
    in education, minimise dropouts, particularly during transition stages, and enhance opportunities
    for progression to post-matric education.'
  source_url: https://www.myscheme.gov.in/schemes/pre-sc
  ask: Are you studying beyond Class 10?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: divyang-additional-benefit
  kind: require
  when:
    field: disability_percent
    op: gt
    value: 0
  clause: Divyang (Disabled) students are eligible for an additional allowance equal to 10%
    of the applicable academic allowance.
  source_url: https://www.myscheme.gov.in/schemes/pre-sc
  ask: Do you have a certified disability?
  self_declared: false
  verify_hint: ''
  review_status: proposed
blocked_rules:
- criterion: The applicant should be studying in a Government school or a recognized private
    school having a valid UDISE code.
  proposed_field:
    name: school_type
    type: string
    meaning: Type of school the applicant is studying in (e.g., 'government', 'recognized
      private', 'unrecognized private').
  suggested_rule_id: school-type-check
- criterion: The applicant should be studying in a Government school or a recognized private
    school having a valid UDISE code.
  proposed_field:
    name: school_has_udise_code
    type: boolean
    meaning: Whether the applicant's school has a valid UDISE code.
  suggested_rule_id: school-udise-code-check
- criterion: The applicant should not hold another educational scholarship for studying in
    Classes I to X.
  proposed_field:
    name: holds_other_educational_scholarship
    type: boolean
    meaning: Whether the applicant currently holds another educational scholarship for classes
      I to X.
  suggested_rule_id: exclude-other-scholarship
- criterion: The applicant should maintain satisfactory academic performance
  proposed_field:
    name: has_satisfactory_academic_performance
    type: boolean
    meaning: Whether the applicant maintains satisfactory academic performance.
  suggested_rule_id: require-satisfactory-academic-performance
- criterion: at least 75% attendance in every academic year for continuation of the scholarship.
  proposed_field:
    name: attendance_percent
    type: integer
    meaning: Applicant's attendance percentage in the current academic year.
  suggested_rule_id: require-75-percent-attendance
- criterion: The applicant should be promoted to the next class for automatic renewal of the
    scholarship.
  proposed_field:
    name: promoted_to_next_class
    type: boolean
    meaning: Whether the applicant has been promoted to the next class.
  suggested_rule_id: require-promotion-to-next-class
- criterion: The applicant repeating the same class is not eligible to receive the scholarship
    for that class for a second or subsequent year.
  proposed_field:
    name: is_repeating_class
    type: boolean
    meaning: Whether the applicant is repeating the current class.
  suggested_rule_id: exclude-repeating-class
- criterion: consolidated academic allowances are provided to Scheduled Caste students studying
    in Classes IX and X.
  proposed_field:
    name: current_class
    type: integer
    meaning: The current class the applicant is studying in (e.g., 1 to 12).
  suggested_rule_id: require-class-9-or-10
- criterion: award scholarships to eligible domiciled students.
  proposed_field:
    name: is_domiciled_in_state
    type: boolean
    meaning: Whether the applicant is domiciled in the state/UT where they are applying.
  suggested_rule_id: require-domicile
rejected_drafts: []
simplifications:
- If awarded another scholarship, the applicant may avail only one scholarship and should
  inform the concerned authorities about the option chosen.
