scheme_id: pmegp
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: awaiting-human-review
  source_url: https://www.myscheme.gov.in/schemes/pmegp
rules:
- id: age-at-least-18
  kind: require
  when:
    field: age
    op: gte
    value: 18
    any: null
    all: null
  clause: 1. Any individual, above 18 years of age.
  source_url: https://www.myscheme.gov.in/schemes/pmegp
  ask: How old are you?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: viii-standard-pass-for-higher-projects
  kind: require
  when:
    field: null
    op: null
    value: null
    any:
    - field: annual_family_income_inr
      op: gt
      value: 1000000
      any: null
      all: null
    - field: annual_family_income_inr
      op: gt
      value: 500000
      any: null
      all: null
    all: null
  clause: 3. For setting up of project costing above Rs.10 lakh in the Manufacturing sector
    and above ₹ 5,00,000 in the Business /Service sector, the beneficiaries should possess
    at least VIII standard pass educational qualification.
  source_url: https://www.myscheme.gov.in/schemes/pmegp
  ask: Do you have at least an VIII standard pass for projects above 10 lakh or 5 lakh?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: meat-industry-exclusion
  kind: exclude
  when:
    field: occupation
    op: eq
    value: meat industry
    any: null
    all: null
  clause: 1. Any Industry/ Business connected with Meat(slaughtered), i.e., processing, canning
    and/or serving items made of it as food, production/Manufacturing or sale of intoxicant
    items like Beedi/Pan/ Cigar/Cigarette etc., any Hotel or Dhaba or sales outlet serving
    liquor, preparation/producing tobacco as raw materials, tapping of toddy for sale will
    not be allowed.
  source_url: https://www.myscheme.gov.in/schemes/pmegp
  ask: Are you involved in the meat industry?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: crop-cultivation-exclusion
  kind: exclude
  when:
    field: occupation
    op: eq
    value: crop cultivation
    any: null
    all: null
  clause: 2. Any Industry/Business connected with cultivation of crops/plantation like Tea,
    Coffee, Rubber etc. Sericulture (Cocoon rearing), Horticulture, Floriculture, Animal Husbandry
    will not be allowed.
  source_url: https://www.myscheme.gov.in/schemes/pmegp
  ask: Are you involved in crop cultivation?
  self_declared: false
  verify_hint: ''
  review_status: proposed
blocked_rules:
- criterion: VIII standard pass educational qualification
  proposed_field:
    name: educational_qualification
    type: string
    meaning: The highest level of education completed
  suggested_rule_id: viii-standard-pass
- criterion: Existing subsidies or schemes
  proposed_field:
    name: existing_subsidies
    type: boolean
    meaning: Whether the individual has availed of any government subsidy under other schemes
  suggested_rule_id: exclude-existing-units
- criterion: Margin money adjustment status
  proposed_field:
    name: margin_money_adjusted
    type: boolean
    meaning: Whether the margin money has been successfully adjusted
  suggested_rule_id: margin-money-claimed-adjusted
- criterion: Loan repayment status
  proposed_field:
    name: loan_repayment_status
    type: boolean
    meaning: Whether the first loan under PMEGP/REGP/MUDRA has been successfully repaid
  suggested_rule_id: first-loan-repaid
- criterion: Unit profitability and growth potential
  proposed_field:
    name: unit_profitability
    type: boolean
    meaning: Whether the unit is profit-making with potential for growth
  suggested_rule_id: unit-profit-making
- criterion: Natural calamity affected status
  proposed_field:
    name: natural_calamity_affected
    type: boolean
    meaning: Whether the individual has been affected by a natural calamity
  suggested_rule_id: priority-to-natural-calamity-affected
- criterion: Family members who have received assistance
  proposed_field:
    name: family_members_assisted
    type: boolean
    meaning: Whether any family member has received financial assistance under PMEGP
  suggested_rule_id: exclude-one-person-per-family
- criterion: Environmental or socio-economic restrictions
  proposed_field:
    name: environmental_restrictions
    type: boolean
    meaning: Whether the activities are prohibited by local authorities due to environmental
      or socio-economic factors
  suggested_rule_id: environmental-exclusion
