rules:
- id: age-at-least-18
  kind: require
  when:
    field: age
    op: gte
    value: 18
  clause: '- Applicant must be aged between 18 and 45 years.'
  source_url: https://www.myscheme.gov.in/schemes/pm-daksh
  ask: What is your age?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: age-at-most-45
  kind: require
  when:
    field: age
    op: lte
    value: 45
  clause: '- Applicant must be aged between 18 and 45 years.'
  source_url: https://www.myscheme.gov.in/schemes/pm-daksh
  ask: What is your age?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: social-category
  kind: require
  when:
    any:
    - field: social_category
      op: eq
      value: sc
    - field: social_category
      op: eq
      value: obc
    - field: social_category
      op: eq
      value: ews
    - field: social_category
      op: eq
      value: dnt
  clause: '- Applicant must belong to one of the following groups: 1. Scheduled Castes (SC);
    1. Other Backward Classes (OBC); 1. Economically Weaker Sections (EWS); 1. Denotified
    & Nomadic Tribes (DNT0, or 1. Safai Mitras (including Waste Pickers).'
  source_url: https://www.myscheme.gov.in/schemes/pm-daksh
  ask: What is your social category?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: annual-family-income
  kind: require
  when:
    any:
    - all:
      - field: social_category
        op: eq
        value: obc
      - field: annual_family_income_inr
        op: lt
        value: 300000
    - all:
      - field: social_category
        op: eq
        value: ews
      - field: annual_family_income_inr
        op: lt
        value: 300000
    - any:
      - field: social_category
        op: eq
        value: sc
      - field: social_category
        op: eq
        value: dnt
      - field: social_category
        op: eq
        value: safai_mitra
  clause: '- Applicant from OBC or EWS must have an annual family income below ₹3,00,000/-
    . - Applicant from SC, DNT, or Safai Mitras (including Waste Pickers) has no income limit.'
  source_url: https://www.myscheme.gov.in/schemes/pm-daksh
  ask: What is your annual family income?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: aadhaar-card
  kind: require
  when:
    field: has_bank_account
    op: eq
    value: true
  clause: '- Applicant must possess a valid Aadhaar card (exemption for the candidates of
    such States which have not implemented Aadhaar completely). - Applicant must have an Aadhaar-linked
    bank account.'
  source_url: https://www.myscheme.gov.in/schemes/pm-daksh
  ask: Do you have an Aadhaar card and an Aadhaar-linked bank account?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
blocked_rules:
- criterion: Applicant must be an Indian national with valid proof of nationality.
  proposed_field:
    name: is_indian_national
    type: boolean
    meaning: Whether the applicant is an Indian national
  suggested_rule_id: is-indian-national
- criterion: 'Attendance: Compulsory AEBAS-based attendance of assessors and candidates during
    assessment. More than 70% of biometric attendance is required for each candidate to appear
    in the assessment in all types of training.'
  proposed_field:
    name: attendance_percentage
    type: integer
    meaning: The percentage of attendance
  suggested_rule_id: attendance-at-least-70
- criterion: 'On the Job Training (OJT): The establishments offering OJT will give a certificate
    at the end of OJT indicating the duration and attendance of the candidate.'
  proposed_field:
    name: ojt_certificate
    type: boolean
    meaning: Whether the applicant has an OJT certificate
  suggested_rule_id: has-ojt-certificate
