  clause: Meritorious Students with aggregate marks within the top 1% of their Class XII examination
    of any State/ Central Education Board in India are eligible.
  source_url: https://www.myscheme.gov.in/schemes/inspire-she
  ask: Are you currently a student?
  self_declared: false
