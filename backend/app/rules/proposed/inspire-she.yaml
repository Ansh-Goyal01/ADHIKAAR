scheme_id: inspire-she
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: awaiting-human-review
  source_url: https://www.myscheme.gov.in/schemes/inspire-she
rules:
- id: is-student
  kind: require
  when:
    field: is_student
