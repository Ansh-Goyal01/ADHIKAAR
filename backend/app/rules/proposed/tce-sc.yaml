scheme_id: tce-sc
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: awaiting-human-review
  source_url: https://www.myscheme.gov.in/schemes/tce-sc
rules:
- id: social-category-sc
  kind: require
  when:
    field: social_category
    op: eq
    value: sc
  clause: The applicant should belong to the Scheduled Caste (SC) category.
  source_url: https://www.myscheme.gov.in/schemes/tce-sc
  ask: Do you belong to the Scheduled Caste (SC) category?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: annual-family-income-lte-800000
  kind: require
  when:
    field: annual_family_income_inr
    op: lte
    value: 800000
  clause: The applicant's total annual family income from all sources should not exceed ₹8,00,000.
  source_url: https://www.myscheme.gov.in/schemes/tce-sc
  ask: What is your total annual family income from all sources?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: exclude-annual-family-income-gt-800000
  kind: exclude
  when:
    field: annual_family_income_inr
    op: gt
    value: 800000
  clause: The applicant shall not be eligible if the annual family income exceeds ₹8,00,000.
  source_url: https://www.myscheme.gov.in/schemes/tce-sc
  ask: What is your total annual family income from all sources?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: is-sc-girl-student
  kind: require
  when:
    all:
    - field: social_category
      op: eq
      value: sc
    - field: gender
      op: eq
      value: female
  clause: 30% of the scholarship slots are reserved for eligible Scheduled Caste girl students.
  source_url: https://www.myscheme.gov.in/schemes/tce-sc
  ask: Are you a Scheduled Caste girl student?
  self_declared: false
  verify_hint: ''
  review_status: proposed
blocked_rules:
- criterion: The applicant should have secured admission to a notified institution identified
    under the scheme.
  proposed_field:
    name: is_admitted_to_notified_institution
    type: boolean
    meaning: Applicant has secured admission to an institution identified as 'notified' under
      the scheme.
  suggested_rule_id: admitted-to-notified-institution
- criterion: The applicant should be pursuing a course beyond Class 12 in a notified institution.
  proposed_field:
    name: is_pursuing_course_beyond_class_12
    type: boolean
    meaning: Applicant is currently pursuing a course of study beyond Class 12.
  suggested_rule_id: pursuing-course-beyond-class-12
- criterion: The applicant should be a first-year student of the approved course for consideration
    under the fresh scholarship category.
  proposed_field:
    name: is_first_year_student
    type: boolean
    meaning: Applicant is currently a first-year student of the approved course.
  suggested_rule_id: is-first-year-student
- criterion: The applicant shall not be eligible for a fresh scholarship if he/she is already
    studying in the 2nd year or a higher year of the course.
  proposed_field:
    name: is_second_year_or_higher_student
    type: boolean
    meaning: Applicant is currently studying in the 2nd year or a higher year of the course.
  suggested_rule_id: exclude-second-year-or-higher-student
- criterion: The applicant shall not be eligible if he/she is not studying in a notified institution
    covered under the scheme.
  proposed_field:
    name: is_not_studying_in_notified_institution
    type: boolean
    meaning: Applicant is not studying in an institution covered under the scheme.
  suggested_rule_id: exclude-not-studying-in-notified-institution
- criterion: The applicant shall not receive benefits under any other similar scholarship
    scheme of the Central Government or a State Government for the same course of study.
  proposed_field:
    name: receives_other_similar_scholarship
    type: boolean
    meaning: Applicant receives benefits under any other similar scholarship scheme of the
      Central or State Government for the same course of study.
  suggested_rule_id: exclude-other-similar-scholarship
- criterion: More than 2 siblings from the same family shall not be eligible to receive benefits
    under the scheme.
  proposed_field:
    name: num_siblings_receiving_scholarship
    type: integer
    meaning: Number of siblings from the same family currently receiving benefits under the
      scheme.
  suggested_rule_id: exclude-more-than-2-siblings
rejected_drafts: []
simplifications:
- The applicant should be admitted through the prescribed admission process and satisfy the
  merit requirements applicable to the institution/course.
- The scholarship shall be discontinued if the applicant changes the institution after selection
  under the scheme.
- The scholarship shall be stopped if the applicant fails to get promoted to the next academic
  year and shall be restored only after promotion to the next class/year.
- Unutilized slots reserved for girls may be transferred to eligible male students.
