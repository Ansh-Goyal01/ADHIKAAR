scheme_id: pg-igssgc
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: awaiting-human-review
  source_url: https://www.myscheme.gov.in/schemes/pg-igssgc
rules:
- id: citizen-of-india
  kind: require
  when:
    field: state
    op: ne
    value: null
    any: null
    all: null
  clause: The applicant must be a citizen of India.
  source_url: https://www.myscheme.gov.in/schemes/pg-igssgc
  ask: Are you a citizen of India?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: age-not-more-than-30
  kind: require
  when:
    field: age
    op: lte
    value: 30
    any: null
    all: null
  clause: The age of the applicant should not be more than 30 years at the time of admission
    in the first year of PG course.
  source_url: https://www.myscheme.gov.in/schemes/pg-igssgc
  ask: Are you 30 years old or less?
  self_declared: false
  verify_hint: ''
  review_status: proposed
- id: gender-female
  kind: require
  when:
    field: gender
    op: eq
    value: female
    any: null
    all: null
  clause: The applicant must be a citizen of India. ... The applicant must be the only girl
    child in the family.
  source_url: https://www.myscheme.gov.in/schemes/pg-igssgc
  ask: Are you female?
  self_declared: false
  verify_hint: ''
  review_status: proposed
blocked_rules:
- criterion: The applicant must be the only girl child in the family.
  proposed_field:
    name: has_brother
    type: bool
    meaning: Whether the applicant has a brother
  suggested_rule_id: only-girl-child
- criterion: The applicant must have taken admission to regular, full-time first-year master's
    degree courses in any designated university or a postgraduate college.
  proposed_field:
    name: is_admitted_to_pgcourse
    type: bool
    meaning: Whether the applicant is admitted to a PG course
  suggested_rule_id: admitted-to-regular-full-time-pg-course
- criterion: The candidate should be pursuing a non-professional course and be taking regular
    classes from a recognized institution.
  proposed_field:
    name: is_pursuing_non_professional_course
    type: bool
    meaning: Whether the applicant is pursuing a non-professional course
  suggested_rule_id: pursuing-non-professional-course
- criterion: The applicant must not be pursuing education through distance education mode.
  proposed_field:
    name: is_pursuing_distance_education
    type: bool
    meaning: Whether the applicant is pursuing education through distance education mode
  suggested_rule_id: not-pursuing-education-through-distance-education-mode
- criterion: This scholarship is available to PG-I year students only.
  proposed_field:
    name: is_pgi_year_student
    type: bool
    meaning: Whether the applicant is a PG-I year student
  suggested_rule_id: pg-i-year-student
- criterion: Admission to PG Course in Distance education mode is not covered under the scheme.
  proposed_field:
    name: is_admitted_to_distance_pgcourse
    type: bool
    meaning: Whether the applicant is admitted to a PG course in distance education mode
  suggested_rule_id: exclude-admission-to-pg-course-in-distance-education-mode
- criterion: Those Deemed Universities which do not receive funds from the Central/ State
    Government are not eligible institutions under the scheme.
  proposed_field:
    name: is_deemed_university_without_funds
    type: bool
    meaning: Whether the applicant's university is a deemed university without funds
  suggested_rule_id: exclude-deemed-universities-not-receiving-funds
- criterion: In a family if one son and one daughter are available then the girl child will
    not be considered for scholarship under the scheme.
  proposed_field:
    name: has_brother
    type: bool
    meaning: Whether the applicant has a brother
  suggested_rule_id: exclude-girl-child-with-brother
