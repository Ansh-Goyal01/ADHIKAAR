- criterion: not availing of benefits under any other pre-matric scholarship scheme
  proposed_field:
    name: receives_other_pre_matric_scholarship
    type: bool
    meaning: whether the student receives another pre-matric scholarship
  suggested_rule_id: not-receiving-other-pre-matric-scholarship
