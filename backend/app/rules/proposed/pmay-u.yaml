scheme_id: pmay-u
version: '2026-07-13'
extraction:
  extracted_at: '2026-07-13'
  status: awaiting-human-review
  source_url: https://www.myscheme.gov.in/schemes/pmay-u
rules:
- id: annual-family-income
  kind: require
  when:
    any:
    - field: annual_family_income_inr
      op: lte
      value: 300000
    - field: annual_family_income_inr
      op: gt
      value: 300000
    - field: annual_family_income_inr
      op: gt
      value: 600000
    - field: annual_family_income_inr
      op: gt
      value: 1200000
    - field: annual_family_income_inr
      op: gt
      value: 1800000
  clause: '1. The family identifies as one of the following - a) Economically Weaker Section
    (EWS): households with annual income up to ₹3,00,000. b) Low Income Group (LIG): households
    with annual income between ₹3,00,001 and ₹6,00,000. c) Middle Income Group-1 (MIG-1):
    households with annual income between ₹6,00,001 and ₹12,00,000. d) Middle Income Group-2
    (MIG-2): households with annual income between ₹12,00,001 and ₹18,00,000.'
  source_url: https://www.myscheme.gov.in/schemes/pmay-u
  ask: What is your annual family income?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: no-pucca-house
  kind: exclude
  when:
    field: house_type
    op: eq
    value: pucca
  clause: 2. The applicant or his/her family members must not own a pucca house in any part
    of the country.
  source_url: https://www.myscheme.gov.in/schemes/pmay-u
  ask: Do you or your family members own a pucca house?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: family-structure
  kind: require
  when:
    field: marital_status
    op: eq
    value: married
  clause: 3. The family must comprise of husband/wife and unmarried children.
  source_url: https://www.myscheme.gov.in/schemes/pmay-u
  ask: What is your marital status?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: urban-residence
  kind: require
  when:
    field: area
    op: eq
    value: urban
  clause: 4. The town/city in which the family resides must be covered under the scheme.
  source_url: https://www.myscheme.gov.in/schemes/pmay-u
  ask: Do you reside in an urban area?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
- id: no-previous-benefits
  kind: exclude
  when:
    field: has_bpl_card
    op: eq
    value: true
  clause: 5. The family MUST NOT have previously availed the benefits of any housing-related
    schemes set up by the Government of India.
  source_url: https://www.myscheme.gov.in/schemes/pmay-u
  ask: Have you or your family members previously availed benefits from any housing-related
    schemes?
  self_declared: false
  verify_hint: ''
  review_status: proposed
  notes_for_reviewer: ''
blocked_rules:
- criterion: The town/city in which the family resides must be covered under the scheme.
  proposed_field:
    name: city_covered_under_scheme
    type: boolean
    meaning: Whether the city of residence is covered under the scheme
  suggested_rule_id: city-covered-under-scheme
- criterion: The family MUST NOT have previously availed the benefits of any housing-related
    schemes set up by the Government of India.
  proposed_field:
    name: previously_availed_housing_benefits
    type: boolean
    meaning: Whether the family has previously availed benefits from any housing-related schemes
  suggested_rule_id: no-previous-housing-benefits
rejected_drafts: []
simplifications:
- The mission covers all statutory towns and notified urban areas as per Census 2011.
- Aadhaar is mandatory for all eligible beneficiaries under the scheme.
