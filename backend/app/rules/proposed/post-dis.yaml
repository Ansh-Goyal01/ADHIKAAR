blocked_rules:
- criterion: Scholarship will not be given to more than two students from a family.
  proposed_field:
    name: number_of_siblings_receiving_scholarship
    type: integer
    meaning: Number of siblings in the family who have received the scholarship
  suggested_rule_id: exclude-more-than-two-siblings
- criterion: If a student has to repeat a class, he/she would not get any scholarship for
    that class for a second (or subsequent) year.
  proposed_field:
    name: number_of_times_class_repeated
    type: integer
    meaning: Number of times the student has repeated the class
  suggested_rule_id: exclude-repeated-class
- criterion: A scholarship holder under this scheme cannot hold any other scholarship or stipend.
  proposed_field:
    name: holds_other_scholarship
    type: boolean
    meaning: Whether the student holds any other scholarship or stipend
  suggested_rule_id: exclude-holds-other-scholarship
